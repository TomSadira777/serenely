  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --lavender-soft:    #eddff8;
      --lavender-mid:     #c8aae8;
      --lavender-dim:     #7a5a9a;
      --lavender-dimmer:  #4e3668;
      --btn-idle-bg:      rgba(82, 48, 128, 0.32);
      --btn-idle-border:  rgba(148, 108, 195, 0.32);
      --btn-active-bg:    rgba(148, 100, 210, 0.5);
      --btn-active-border:rgba(215, 178, 250, 0.82);
      --btn-active-glow:  rgba(180, 130, 248, 0.35);
      --play-bg:          rgba(62, 32, 105, 0.82);
      --play-border:      rgba(185, 145, 228, 0.55);

      /* Cluster sizing — driven by viewport, capped for large screens */
      --cluster-size: min(88vw, 400px);
      --sound-btn-size: calc(var(--cluster-size) * 0.33);
      --play-btn-size:  calc(var(--cluster-size) * 0.18);
    }

    html {
      height: 100%;
      /* fill safe area on notched phones */
      height: -webkit-fill-available;
    }

    body {
      min-height: 100%;
      min-height: -webkit-fill-available;
      overflow: hidden;
      background: #130a22;
      color: var(--lavender-soft);
      font-family: 'Cormorant Garamond', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation;
      user-select: none;
      /* safe area insets for notch/home bar */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Rich layered background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 90% 60% at 50% 20%, rgba(88, 42, 148, 0.7) 0%, transparent 65%),
        radial-gradient(ellipse 60% 80% at 10% 90%, rgba(44, 15, 82, 0.6) 0%, transparent 55%),
        radial-gradient(ellipse 55% 55% at 90% 80%, rgba(88, 40, 130, 0.35) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 80% 10%, rgba(60, 20, 110, 0.3) 0%, transparent 50%),
        linear-gradient(175deg, #130a22 0%, #220f3a 45%, #160c28 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle star-like specks */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 15%, rgba(220,200,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 8%,  rgba(220,200,255,0.18) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 88%, rgba(220,200,255,0.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 55%, rgba(220,200,255,0.2)  0%, transparent 100%),
        radial-gradient(1px 1px at 12% 70%, rgba(220,200,255,0.18) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 42% 5%,  rgba(220,200,255,0.22) 0%, transparent 100%),
        radial-gradient(1px 1px at 93% 30%, rgba(220,200,255,0.16) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── App shell ── */
    #app {
      position: relative; z-index: 1;
      width: 100%;
      height: 100vh;
      height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 16px 24px 24px;
    }

    /* ── Wordmark ── */
    .wordmark {
      text-align: center;
      margin-bottom: clamp(20px, 5vh, 40px);
      animation: fadeUp 1.8s cubic-bezier(0.16,1,0.3,1) forwards;
      opacity: 0;
    }

    .wordmark h1 {
      font-family: 'Pinyon Script', 'Dancing Script', cursive;
      font-size: clamp(60px, 16vw, 96px);
      color: var(--lavender-soft);
      letter-spacing: 4px;
      line-height: 1;
      text-shadow:
        0 0 60px rgba(180, 140, 240, 0.6),
        0 0 120px rgba(130, 85, 210, 0.25),
        0 2px 4px rgba(0,0,0,0.4);
    }

    /* thin divider line beneath wordmark */
    .wordmark::after {
      content: '';
      display: block;
      width: 48px;
      height: 1px;
      margin: 10px auto 0;
      background: linear-gradient(to right, transparent, rgba(180,140,220,0.4), transparent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Cluster ── */
    .cluster {
      position: relative;
      width: var(--cluster-size);
      height: var(--cluster-size);
      animation: fadeUp 1.8s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
      opacity: 0;
      flex-shrink: 0;
    }

    /* ── Center play button ── */
    .play-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: var(--play-btn-size);
      height: var(--play-btn-size);
      border-radius: 50%;
      background: var(--play-bg);
      border: 1.5px solid var(--play-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      z-index: 2;
      transition: background 0.2s, border-color 0.2s;
      /* inset glow */
      box-shadow:
        inset 0 1px 0 rgba(220,190,255,0.15),
        0 4px 20px rgba(0,0,0,0.35);
    }

    .play-btn svg {
      width: 36%;
      height: 36%;
      fill: var(--lavender-soft);
      opacity: 0.92;
      /* nudge play icon to optically center */
    }

    .play-btn svg:first-child { margin-left: 3px; } /* play triangle */

    .play-btn.playing {
      border-color: rgba(210, 170, 255, 0.7);
      box-shadow:
        inset 0 1px 0 rgba(220,190,255,0.15),
        0 4px 20px rgba(0,0,0,0.35),
        0 0 0 0 rgba(175,125,240,0.5);
      animation: pulse-ring 3s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%   { box-shadow: inset 0 1px 0 rgba(220,190,255,0.15), 0 4px 20px rgba(0,0,0,0.35), 0 0 0 0   rgba(175,125,240,0.45); }
      70%  { box-shadow: inset 0 1px 0 rgba(220,190,255,0.15), 0 4px 20px rgba(0,0,0,0.35), 0 0 0 28px rgba(175,125,240,0);   }
      100% { box-shadow: inset 0 1px 0 rgba(220,190,255,0.15), 0 4px 20px rgba(0,0,0,0.35), 0 0 0 0   rgba(175,125,240,0);   }
    }

    /* ── Sound buttons ── */
    .sound-btn {
      position: absolute;
      width: var(--sound-btn-size);
      height: var(--sound-btn-size);
      border-radius: 50%;
      background: var(--btn-idle-bg);
      border: 1.5px solid var(--btn-idle-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transform: translate(-50%, -50%);
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      /* backdrop blur for glassmorphism feel */
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }

    .sound-btn .btn-icon {
      width: 38%;
      height: 38%;
      object-fit: contain;
      opacity: 0.68;
      transition: opacity 0.3s ease;
      /* fallback emoji sizing */
      font-size: calc(var(--sound-btn-size) * 0.28);
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }

    .sound-btn .btn-icon img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }

    .sound-btn .label {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(14px, 4vw, 18px);
      font-style: italic;
      font-weight: 300;
      letter-spacing: 0.4px;
      color: var(--lavender-dim);
      text-align: center;
      line-height: 1.3;
      transition: color 0.3s ease;
    }

    .sound-btn.active {
      background: var(--btn-active-bg);
      border-color: var(--btn-active-border);
      box-shadow:
        0 2px 12px rgba(0,0,0,0.25),
        0 0 22px var(--btn-active-glow),
        inset 0 1px 0 rgba(230,200,255,0.15);
    }

    .sound-btn.active .btn-icon { opacity: 1; }
    .sound-btn.active .label    { color: var(--lavender-mid); }

    /* ── Volume ── */
    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: clamp(18px, 4vh, 36px);
      animation: fadeUp 1.8s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
      opacity: 0;
      width: 100%;
      max-width: 320px;
    }

    .vol-icon {
      width: 18px; height: 18px;
      stroke: var(--lavender-dimmer);
      fill: none;
      flex-shrink: 0;
      transition: stroke 0.3s;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 2px;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      background: linear-gradient(
        to right,
        var(--lavender-dim) 0%,
        var(--lavender-dim) var(--vol-pct, 70%),
        rgba(90, 55, 130, 0.3) var(--vol-pct, 70%),
        rgba(90, 55, 130, 0.3) 100%
      );
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--lavender-soft);
      box-shadow: 0 0 12px rgba(190, 150, 240, 0.75);
      cursor: pointer;
    }

    input[type=range]::-moz-range-thumb {
      width: 18px; height: 18px;
      border: none; border-radius: 50%;
      background: var(--lavender-soft);
      box-shadow: 0 0 12px rgba(190, 150, 240, 0.75);
      cursor: pointer;
    }

    /* ── Hint ── */
    .hint {
      margin-top: clamp(12px, 3vh, 22px);
      font-size: 10px;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: rgba(140, 105, 180, 0.22);
      font-style: italic;
      animation: fadeUp 1.8s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
      opacity: 0;
    }
    /* ── No birds ── */
    .no-birds {
      margin-top: clamp(10px, 2.5vh, 20px);
      font-family: 'Pinyon Script', 'Dancing Script', cursive;
      font-size: clamp(18px, 5vw, 26px);
      color: rgba(160, 120, 200, 0.28);
      letter-spacing: 1px;
      animation: fadeUp 1.8s cubic-bezier(0.16,1,0.3,1) 1.1s forwards;
      opacity: 0;
    }
  </style>
</head>
<body>
<div id="app">

  <div class="wordmark">
    <h1>Serenely</h1>
  </div>

  <div class="cluster" id="cluster">
    <!-- Sound buttons injected by JS -->
    <button class="play-btn" id="playBtn" aria-label="Play / Pause">
      <svg id="iconPlay"  viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>
      <svg id="iconPause" viewBox="0 0 24 24" style="display:none">
        <rect x="5" y="4" width="4" height="16" rx="1.5"/>
        <rect x="15" y="4" width="4" height="16" rx="1.5"/>
      </svg>
    </button>
  </div>

  <div class="volume-wrap">
    <svg class="vol-icon" viewBox="0 0 24 24" stroke-width="1.75">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    </svg>
    <input type="range" id="volSlider" min="0" max="100" value="70" />
    <svg class="vol-icon" viewBox="0 0 24 24" stroke-width="1.75">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
  </div>

  <p class="no-birds">absolutely no fucking birds</p>

</div>

<audio id="audio-waves"      src="sounds/waves.mp3"      loop preload="none"></audio>
<audio id="audio-rain"       src="sounds/rain.mp3"       loop preload="none"></audio>
<audio id="audio-dishwasher" src="sounds/dishwasher.mp3" loop preload="none"></audio>

<script>
// ─────────────────────────────────────────────────
//  SERENELY · Sleep Sound Machine
// ─────────────────────────────────────────────────

// Each sound has an optional `img` filename in sounds/icons/.
// If the image fails to load, the emoji fallback shows instead.
const SOUNDS = [
  { key:'waves', label:'ocean\nwaves', emoji:'🌊', img:'sounds/icons/waves.png',  type:'mp3' },
  { key:'rain',  label:'rain',         emoji:'🌧️', img:'sounds/icons/rain.png',   type:'mp3' },
  { key:'brown', label:'brown\nnoise', emoji:'〰️', img:'sounds/icons/brown.png',  type:'gen' },
  { key:'pink',  label:'pink\nnoise',  emoji:'🌸', img:'sounds/icons/pink.png',   type:'gen' },
  { key:'dishwasher', label:'dishwasher', emoji:'🫧', img:'sounds/icons/dishwasher.png', type:'mp3' },
];

// ── Build circular button layout ─────────────────
// Cluster is square; center = 50% 50%.
// We derive orbit radius from the CSS custom property at runtime.
const cluster = document.getElementById('cluster');

function buildCluster() {
  const size   = cluster.offsetWidth;
  const ctr    = size / 2;
  const orbit  = size * 0.355;

  SOUNDS.forEach((s, i) => {
    const deg = (360 / SOUNDS.length) * i - 90;
    const rad = deg * Math.PI / 180;
    const x   = ctr + orbit * Math.cos(rad);
    const y   = ctr + orbit * Math.sin(rad);

    const btn = document.createElement('button');
    btn.className = 'sound-btn';
    btn.id = 'btn-' + s.key;
    btn.dataset.key = s.key;
    btn.setAttribute('aria-label', s.label.replace('\n', ' '));
    btn.style.left = x + 'px';
    btn.style.top  = y + 'px';

    // Label only — centered, no icon
    const labelEl = document.createElement('span');
    labelEl.className = 'label';
    labelEl.innerHTML = s.label.split('\n').join('<br>');
    btn.appendChild(labelEl);
    cluster.appendChild(btn);
  });
}

buildCluster();

// ── State ─────────────────────────────────────────
const STATE = {
  selected:   new Set(),
  playing:    false,
  volume:     0.7,
  audioCtx:   null,
  noiseNodes: {},
  wakeLock:   null,
};

const mpAudio = {
  waves:      document.getElementById('audio-waves'),
  rain:       document.getElementById('audio-rain'),
  dishwasher: document.getElementById('audio-dishwasher'),
};

// ── Audio context ─────────────────────────────────
function getCtx() {
  if (!STATE.audioCtx)
    STATE.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (STATE.audioCtx.state === 'suspended') STATE.audioCtx.resume();
  return STATE.audioCtx;
}

// ── Noise generators ──────────────────────────────
function makeWhiteBuffer(c) {
  const sz = 2 * c.sampleRate;
  const buf = c.createBuffer(1, sz, c.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < sz; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
  const src = c.createBufferSource(); src.buffer = buf; src.loop = true; return src;
}

function makeBrownBuffer(c) {
  const sz = 4 * c.sampleRate;
  const buf = c.createBuffer(1, sz, c.sampleRate);
  const d = buf.getChannelData(0);
  let last = 0;
  for (let i = 0; i < sz; i++) {
    const w = Math.random() * 2 - 1;
    last = (last + 0.02 * w) / 1.02;
    d[i] = last;
  }
  let peak = 0;
  for (let i = 0; i < sz; i++) peak = Math.max(peak, Math.abs(d[i]));
  if (peak > 0) for (let i = 0; i < sz; i++) d[i] = (d[i] / peak) * 0.5;
  const src = c.createBufferSource(); src.buffer = buf; src.loop = true; return src;
}

function makePinkBuffer(c) {
  const sz = 4 * c.sampleRate;
  const buf = c.createBuffer(1, sz, c.sampleRate);
  const d = buf.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for (let i = 0; i < sz; i++) {
    const w = Math.random() * 2 - 1;
    b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
    b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
    b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
    d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926;
  }
  let peak = 0;
  for (let i = 0; i < sz; i++) peak = Math.max(peak, Math.abs(d[i]));
  if (peak > 0) for (let i = 0; i < sz; i++) d[i] = (d[i] / peak) * 0.5;
  const src = c.createBufferSource(); src.buffer = buf; src.loop = true; return src;
}

function startNoise(key) {
  if (STATE.noiseNodes[key]) return;
  const c = getCtx();
  const src = key==='white' ? makeWhiteBuffer(c)
            : key==='brown' ? makeBrownBuffer(c)
            : makePinkBuffer(c);

  const filter = c.createBiquadFilter();
  filter.type = 'lowpass';
  filter.Q.value = 0.5;
  filter.frequency.value = key==='brown' ? 1200 : key==='pink' ? 4000 : 6000;

  const gain = c.createGain();
  gain.gain.value = STATE.volume;

  src.connect(filter);
  filter.connect(gain);
  gain.connect(c.destination);
  src.start();

  STATE.noiseNodes[key] = { src, filter, gain };
}

function stopNoise(key) {
  const n = STATE.noiseNodes[key]; if (!n) return;
  try { n.src.stop(); } catch(e) {}
  try { n.filter.disconnect(); } catch(e) {}
  n.gain.disconnect();
  delete STATE.noiseNodes[key];
}

// ── Volume ────────────────────────────────────────
const volSlider = document.getElementById('volSlider');

function applyVolume(v) {
  STATE.volume = v;
  Object.values(mpAudio).forEach(a => a.volume = v);
  if (STATE.audioCtx) {
    Object.values(STATE.noiseNodes).forEach(n =>
      n.gain.gain.setTargetAtTime(v, STATE.audioCtx.currentTime, 0.05)
    );
  }
  volSlider.style.setProperty('--vol-pct', (v * 100) + '%');
}

volSlider.addEventListener('input', () => applyVolume(volSlider.value / 100));
applyVolume(0.7);

// ── Sound helpers ─────────────────────────────────
function startSound(key) {
  const s = SOUNDS.find(s => s.key === key);
  if (s.type === 'gen') {
    startNoise(key);
  } else {
    const a = mpAudio[key];
    if (a) { a.volume = STATE.volume; a.play().catch(() => {}); }
  }
}

function stopSound(key) {
  const s = SOUNDS.find(s => s.key === key);
  if (s.type === 'gen') {
    stopNoise(key);
  } else {
    const a = mpAudio[key];
    if (a) { a.pause(); a.currentTime = 0; }
  }
}

function stopAll() {
  ['white','pink','brown'].forEach(stopNoise);
  Object.values(mpAudio).forEach(a => { a.pause(); a.currentTime = 0; });
}

// ── Wake lock ─────────────────────────────────────
async function acquireWakeLock() {
  if ('wakeLock' in navigator)
    try { STATE.wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
}
function releaseWakeLock() {
  if (STATE.wakeLock) { STATE.wakeLock.release(); STATE.wakeLock = null; }
}
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible') {
    if (STATE.audioCtx?.state === 'suspended') STATE.audioCtx.resume();
    if (STATE.playing) acquireWakeLock();
  }
});

// ── Sound button taps ─────────────────────────────
cluster.addEventListener('click', e => {
  const btn = e.target.closest('.sound-btn');
  if (!btn) return;
  const key = btn.dataset.key;
  if (STATE.selected.has(key)) {
    STATE.selected.delete(key);
    btn.classList.remove('active');
    if (STATE.playing) stopSound(key);
  } else {
    STATE.selected.add(key);
    btn.classList.add('active');
    if (STATE.playing) startSound(key);
  }
});

// ── Play / pause ──────────────────────────────────
const playBtn   = document.getElementById('playBtn');
const iconPlay  = document.getElementById('iconPlay');
const iconPause = document.getElementById('iconPause');

function setPlayUI(on) {
  iconPlay.style.display  = on ? 'none'  : 'block';
  iconPause.style.display = on ? 'block' : 'none';
  on ? playBtn.classList.add('playing') : playBtn.classList.remove('playing');
}

playBtn.addEventListener('click', async () => {
  if (!STATE.playing) {
    if (!STATE.selected.size) {
      // gentle flash hint — pick a sound first
      playBtn.style.transition = 'box-shadow 0.1s';
      playBtn.style.boxShadow = '0 0 0 16px rgba(180,125,240,0.28), 0 4px 20px rgba(0,0,0,0.35)';
      setTimeout(() => { playBtn.style.boxShadow = ''; playBtn.style.transition = ''; }, 500);
      return;
    }
    STATE.playing = true;
    setPlayUI(true);
    STATE.selected.forEach(k => startSound(k));
    await acquireWakeLock();
  } else {
    STATE.playing = false;
    setPlayUI(false);
    stopAll();
    releaseWakeLock();
  }
});

// ── Service worker ────────────────────────────────
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
